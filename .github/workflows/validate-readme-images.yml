name: Validate README Images

on:
  pull_request:
    paths:
      - README.md
      - .github/workflows/validate-readme-images.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/validate-readme-images.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate README image endpoints
        run: |
          python <<'PY'
          import re
          import sys
          import time
          from pathlib import Path
          from urllib.parse import urlparse

          import requests

          readme = Path("README.md").read_text(encoding="utf-8")
          markdown_images = re.findall(r"!\[[^\]]*]\((https?://[^)\s]+)\)", readme)
          html_images = re.findall(r'<img[^>]*\ssrc="(https?://[^"]+)"', readme, flags=re.IGNORECASE)
          urls = sorted(set(markdown_images + html_images))

          if not urls:
              print("No remote image URLs found in README.md")
              sys.exit(0)

          failures = []
          headers = {"User-Agent": "readme-image-validator"}

          def check(url: str) -> None:
              host = urlparse(url).netloc
              for attempt in range(1, 4):
                  try:
                      response = requests.get(url, headers=headers, timeout=25, allow_redirects=True)
                      content_type = response.headers.get("content-type", "").lower()
                      is_image = content_type.startswith("image/") or "svg" in content_type
                      if response.status_code != 200:
                          failures.append(f"[{host}] {url} -> HTTP {response.status_code}")
                          return
                      if not is_image:
                          failures.append(f"[{host}] {url} -> Non-image content-type: {content_type or 'missing'}")
                          return
                      print(f"OK: {url} -> {content_type}")
                      return
                  except requests.RequestException as exc:
                      if attempt == 3:
                          failures.append(f"[{host}] {url} -> Request failed: {exc}")
                          return
                      time.sleep(2)

          for image_url in urls:
              check(image_url)

          if failures:
              print("\nREADME image validation failed:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("\nAll README image URLs returned image content successfully.")
          PY
